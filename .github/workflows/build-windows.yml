name: Compilar instalador Windows

# Se ejecuta automáticamente al subir cambios a "main", o manualmente
# desde la pestaña "Actions" del repositorio (botón "Run workflow").
on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        run: npm install

      - name: Generar el instalador .exe
        run: npm run dist

      - name: Publicar el instalador como artefacto descargable
        uses: actions/upload-artifact@v4
        with:
          name: Inventario-CSIRC-UGR-Windows
          path: dist/*.exe
